spring.application.name=gateway-service
server.port=8081

# Récupération des configurations depuis le Config Server
spring.config.import=configserver:http://localhost:8888

spring.cloud.config.enabled=true

#  Activer la communication avec Eureka
spring.cloud.discovery.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

#  Découverte automatique des routes via Eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

#  Route statique vers salle-service (optionnel avec discovery)
spring.cloud.gateway.routes[0].id=salle-Service
spring.cloud.gateway.routes[0].uri=lb://salle-Service
spring.cloud.gateway.routes[0].predicates[0]=Path=/salle/**
spring.cloud.gateway.routes[0].filters[0]=AddRequestHeader=X-Gateway,salleService
